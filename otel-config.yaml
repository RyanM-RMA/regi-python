receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: detailed
  # Jaeger handles OTLP natively
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Standard Prometheus exporter
  prometheus:
    endpoint: "0.0.0.0:8889"
  # Use the standard OTLP HTTP exporter to talk to Loki
  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      exporters: [otlphttp/loki, debug]